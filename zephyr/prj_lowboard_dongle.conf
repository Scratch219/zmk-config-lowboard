# Basic ZMK/Zephyr features
CONFIG_SERIAL=y
CONFIG_BT=y
CONFIG_BT_CTLR= # leave empty if handled by board; otherwise default
CONFIG_BT_DEVICE_NAME="Lowboard Dongle"

# Bluetooth roles and features
CONFIG_BT_CENTRAL=y
CONFIG_BT_CONN=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_HCI_VS_EXT=y

# BLE HID central support via ZMK's HCI gateway
# ZMK expects Zephyr bluetooth enabled; specifics below are typical flags:
CONFIG_BT_SETTINGS=y
CONFIG_BT_HCI=y

# USB device (so the dongle can show up as USB HID to host)
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_HID=y
CONFIG_USB_DEVICE_PRODUCT="Lowboard Dongle"
CONFIG_USB_DEVICE_MANUFACTURER="Lowboard"

# Power management (optional)
CONFIG_PM=y

# Logging (optional; reduce for release)
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
